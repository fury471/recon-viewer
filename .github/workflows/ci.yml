name: CI

on:
  push:
    branches: [ main ]
    paths-ignore: [ '**.md', 'docs/**' ]
  pull_request:
    paths-ignore: [ '**.md', 'docs/**' ]
  workflow_dispatch:        # lets you trigger a run manually from the Actions tab

# If a newer commit lands on the same branch/PR, cancel the older run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest   # 1× minutes, and proves the project is portable
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true        # clone the pinned vcpkg

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Install GLFW build dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxinerama-dev libxcursor-dev xorg-dev libglu1-mesa-dev pkg-config

      - name: Configure
        run: cmake --preset default

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure